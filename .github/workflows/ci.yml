name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e "python[dev]"
      - name: Lint
        run: ruff check python/openocr python/tests
      - name: Test
        run: pytest python/tests -v

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json
      - name: Install
        run: npm ci
        working-directory: typescript
      - name: Typecheck
        run: npm run typecheck
        working-directory: typescript
      - name: Test
        run: npm test
        working-directory: typescript
      - name: Build
        run: npm run build
        working-directory: typescript
